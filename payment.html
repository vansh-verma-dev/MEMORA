<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Memora Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <div class="container">

    <!-- LEFT SIDE -->
    <div class="card">

      <h2>Customer Details</h2>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name">
      </div>

      <div class="row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Enter email">
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="text" placeholder="Enter number">
        </div>
      </div>

      <h2>Shipping Address</h2>

      <div class="form-group">
        <label>Address</label>
        <input type="text" placeholder="Street address">
      </div>

      <div class="row">
        <div class="form-group">
          <label>City</label>
          <input type="text">
        </div>

        <div class="form-group">
          <label>State</label>
          <input type="text">
        </div>
      </div>

      <div class="form-group">
        <label>Pincode</label>
        <input type="text">
      </div>

      <h2>Payment Method</h2>

      <div class="payment-methods">
        <label class="payment-option">
          <input type="radio" name="payment">
          UPI
        </label>

        <label class="payment-option">
          <input type="radio" name="payment">
          Debit / Credit Card
        </label>

        <label class="payment-option">
          <input type="radio" name="payment">
          Cash on Delivery
        </label>
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="card">

      <h2>Order Summary</h2>

      <div class="summary-item">
        <span>Product Name</span>
        <span>₹ --</span>
      </div>

      <div class="summary-item">
        <span>Delivery</span>
        <span>₹ 50</span>
      </div>

      <div class="summary-item">
        <span>Discount</span>
        <span>- ₹ 0</span>
      </div>

      <hr>

      <div class="summary-item total">
        <span>Total</span>
        <span>₹ --</span>
      </div>

      <button class="btn">Place Order</button>

      <div class="secure">
        🔒 100% Secure Payment
      </div>

    </div>

  </div>

</body>
</html>
